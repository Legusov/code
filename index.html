<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🧑‍💻 Telegram Браузер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      height: 100vh; overflow: hidden; background: #f8f9fa;
      padding-top: var(--tg-safe-area-inset-top, 20px);
      padding-bottom: var(--tg-safe-area-inset-bottom, 0px);
      padding-left: var(--tg-safe-area-inset-left, 0px);
      padding-right: var(--tg-safe-area-inset-right, 0px);
    }
    
    .telegram-ready { display: none; }
    .not-telegram { 
      text-align: center; padding: 40px 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; min-height: 100vh; display: flex; flex-direction: column; 
      justify-content: center; align-items: center;
    }
    
    .toolbar {
      position: sticky; top: 0; z-index: 1000;
      display: flex; align-items: center; padding: 12px; 
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
    }
    
    .nav-btn {
      width: 36px; height: 36px; margin: 0 4px; 
      background: rgba(255,255,255,0.2); color: white; 
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 16px; transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled), .nav-btn:active:not(:disabled) { 
      background: rgba(255,255,255,0.3); transform: scale(1.05); 
    }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    #urlInput {
      flex: 1; margin: 0 8px; padding: 10px 14px; 
      border: none; border-radius: 20px; font-size: 14px;
      background: rgba(255,255,255,0.9); color: #333;
    }
    
    #pageFrame {
      width: 100%; 
      height: calc(100vh - 60px - var(--tg-safe-area-inset-top, 20px) - var(--tg-safe-area-inset-bottom, 0px));
      border: none; background: white;
    }
    
    .status {
      position: fixed; top: var(--tg-safe-area-inset-top, 20px); left: 0; right: 0; 
      padding: 8px; background: rgba(0,0,0,0.8); color: white; font-size: 12px; 
      text-align: center; transition: opacity 0.3s; z-index: 999;
    }
    
    #pageFrame.loading { opacity: 0.7; position: relative; }
    #pageFrame.loading::after {
      content: '⏳ Загрузка...'; position: absolute; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); 
      color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
  </style>
</head>
<body>
  <!-- Fallback для НЕ-Telegram -->
  <div id="notTelegram" class="not-telegram">
    <h2 style="margin-bottom: 10px;">🧑‍💻 Telegram Мини-Браузер</h2>
    <p style="margin: 20px 0; max-width: 400px; opacity: 0.9;">
      Навигация • Закладки • Полноэкранный режим
    </p>
    <a href="https://t.me/mini_app_for_tg_bot/mini_browser" 
       style="display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 14px 28px; border-radius: 25px; text-decoration: none; font-weight: 600; backdrop-filter: blur(10px);">
      🚀 Открыть в Telegram
    </a>
    <p style="margin-top: 30px; font-size: 12px; opacity: 0.8;">Яндекс • YouTube • Навигация</p>
  </div>
  
  <!-- Браузер -->
  <div id="browser" class="telegram-ready">
    <div class="status" id="status">Инициализация...</div>
    <div class="toolbar">
      <button id="backBtn" class="nav-btn" title="Назад">◀</button>
      <button id="forwardBtn" class="nav-btn" title="Вперёд">▶</button>
      <button id="homeBtn" class="nav-btn" title="Яндекс">🏠</button>
      <button id="bookmarkBtn" class="nav-btn" title="YouTube">📺</button>
      <button id="reloadBtn" class="nav-btn" title="Обновить">⟳</button>
      <input type="text" id="urlInput" placeholder="ya.ru / youtube.com" />
      <button id="goBtn" class="nav-btn" title="Перейти">GO</button>
    </div>
    <iframe id="pageFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    const isTelegram = !!tg && !!tg.initData;
  
    const browserEl = document.getElementById('browser');
    const notTelegramEl = document
    
    if (isTelegram) {
      tg.ready();
      tg.requestSafeArea();
      tg.expand();
      
      notTelegram.style.display = 'none';
      browser.style.display = 'block';
      
      // MainButton с параметром startapp
      const startParam = tg.initDataUnsafe?.start_app;
      tg.MainButton.setText(startParam === 'mini_browser' ? '⭐ Яндекс' : '⭐ Главная')
        .onClick(() => loadUrl('https://ya.ru')).show();
      
      document.getElementById('status').textContent = 'Готов! 👋';
    } else {
      browser.style.display = 'none';
    }
    
    // Элементы
    const frame = document.getElementById('pageFrame');
    const urlInput = document.getElementById('urlInput');
    const status = document.getElementById('status');
    
    let historyStack = ['https://ya.ru'];
    let currentIndex = 0;
    
    function loadUrl(url) {
      if (!url.match(/^https?:\/\//)) url = 'https://' + url;
      
      status.textContent = 'Загрузка...';
      frame.classList.add('loading');
      
      historyStack = historyStack.slice(0, currentIndex + 1);
      historyStack.push(url);
      currentIndex = historyStack.length - 1;
      
      frame.src = url;
      urlInput.value = url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
      updateButtons();
    }
    
    function updateButtons() {
      document.getElementById('backBtn').disabled = currentIndex <= 0;
      document.getElementById('forwardBtn').disabled = currentIndex >= historyStack.length - 1;
    }
    
    // Кнопки
    document.getElementById('backBtn').onclick = () => {
      if (currentIndex > 0) {
        currentIndex--;
        frame.src = historyStack[currentIndex];
        urlInput.value = new URL(frame.src).hostname;
        updateButtons();
      }
    };
    
    document.getElementById('forwardBtn').onclick = () => {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        frame.src = historyStack[currentIndex];
        urlInput.value = new URL(frame.src).hostname;
        updateButtons();
      }
    };
    
    document.getElementById('homeBtn').onclick = () => loadUrl('https://ya.ru');
    document.getElementById('bookmarkBtn').onclick = () => loadUrl('https://m.youtube.com');
    document.getElementById('reloadBtn').onclick = () => frame.src = frame.src;
    document.getElementById('goBtn').onclick = () => loadUrl(urlInput.value);
    
    urlInput.onkeypress = (e) => { if (e.key === 'Enter') loadUrl(urlInput.value); };
    
    frame.onload = () => {
      frame.classList.remove('loading');
      try {
        status.textContent = new URL(frame.src).hostname;
      } catch(e) {
        status.textContent = 'Загружено';
      }
      updateButtons();
    };
    
    frame.onerror = () => {
      frame.classList.remove('loading');
      status.textContent = '❌ Ошибка загрузки';
    };
    
    // Запуск
    loadUrl('https://ya.ru');
  </script>
</body>
</html>
