<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🧑‍💻 Telegram Браузер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      height: 100vh; overflow: hidden; background: #f8f9fa;
      /* ФИКС кнопок Telegram */
      padding-top: env(safe-area-inset-top, 60px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    .toolbar {
      position: sticky; top: env(safe-area-inset-top, 60px); z-index: 1001;
      display: flex; align-items: center; padding: 12px; 
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
    }
    
    .nav-btn {
      width: 40px; height: 40px; margin: 0 4px; 
      background: rgba(255,255,255,0.2); color: white; 
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 16px; transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled), .nav-btn:active:not(:disabled) { 
      background: rgba(255,255,255,0.3); transform: scale(1.05); 
    }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    #urlInput {
      flex: 1; margin: 0 8px; padding: 12px 16px; 
      border: none; border-radius: 20px; font-size: 14px;
      background: rgba(255,255,255,0.9); color: #333;
    }
    
    #pageFrame {
      width: 100%; 
      height: calc(100vh - 120px);
      border: none; background: white;
      display: block;
    }
    
    .status {
      position: fixed; top: env(safe-area-inset-top, 60px); left: 0; right: 0; 
      padding: 8px; background: rgba(0,0,0,0.8); color: white; font-size: 12px; 
      text-align: center; z-index: 1000;
    }
    
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9); display: flex; align-items: center; 
      justify-content: center; z-index: 2000; font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="status" id="status">Запуск...</div>
  
  <div class="toolbar">
    <button id="backBtn" class="nav-btn" title="Назад">◀</button>
    <button id="forwardBtn" class="nav-btn" title="Вперёд">▶</button>
    <button id="homeBtn" class="nav-btn" title="Яндекс">🏠</button>
    <button id="bookmarkBtn" class="nav-btn" title="YouTube">📺</button>
    <button id="reloadBtn" class="nav-btn" title="Обновить">⟳</button>
    <input type="text" id="urlInput" placeholder="Введите адрес (ya.ru)" />
    <button id="goBtn" class="nav-btn" title="Перейти">GO</button>
  </div>
  
  <iframe id="pageFrame" src="about:blank"></iframe>
  
  <div id="loading" class="loading-overlay" style="display: none;">
    ⏳ Загружаем страницу...
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.MainButton.setText('🏠 Яндекс').onClick(openYaRu).show();
    }
    
    const frame = document.getElementById('pageFrame');
    const urlInput = document.getElementById('urlInput');
    const status = document.getElementById('status');
    const loading = document.getElementById('loading');
    
    let historyStack = ['https://www.google.com'];
    let currentIndex = 0;
    
    function showLoading() {
      loading.style.display = 'flex';
      status.textContent = 'Загрузка...';
    }
    
    function hideLoading() {
      loading.style.display = 'none';
    }
    
    function loadUrl(url) {
      if (!url.match(/^https?:\/\//i)) {
        url = 'https://' + url;
      }
      
      showLoading();
      historyStack = historyStack.slice(0, currentIndex + 1);
      historyStack.push(url);
      currentIndex = historyStack.length - 1;
      
      frame.src = url;
      urlInput.value = url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/.*$/, '');
      updateButtons();
    }
    
    function openYaRu() {
      loadUrl('https://ya.ru');
    }
    
    function openYouTube() {
      loadUrl('https://m.youtube.com');
    }
    
    function updateButtons() {
      document.getElementById('backBtn').disabled = currentIndex <= 0;
      document.getElementById('forwardBtn').disabled = currentIndex >= historyStack.length - 1;
    }
    
    // Кнопки
    document.getElementById('backBtn').onclick = () => {
      if (currentIndex > 0) {
        currentIndex--;
        frame.src = historyStack[currentIndex];
      }
    };
    
    document.getElementById('forwardBtn').onclick = () => {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        frame.src = historyStack[currentIndex];
      }
    };
    
    document.getElementById('homeBtn').onclick = openYaRu;
    document.getElementById('bookmarkBtn').onclick = openYouTube;
    document.getElementById('reloadBtn').onclick = () => frame.src = frame.src;
    document.getElementById('goBtn').onclick = () => loadUrl(urlInput.value);
    
    urlInput.onkeypress = (e) => { 
      if (e.key === 'Enter') loadUrl(urlInput.value); 
    };
    
    // События iframe
    frame.onload = () => {
      hideLoading();
      try {
        const url = new URL(frame.src);
        status.textContent = url.hostname;
      } catch(e) {
        status.textContent = 'Загружено';
      }
      updateButtons();
    };
    
    frame.onerror = () => {
      hideLoading();
      status.textContent = 'Ошибка загрузки';
      // Fallback: открываем во внешнем браузере
      if (tg) {
        tg.openLink(historyStack[currentIndex]);
      }
    };
    
    // Старт
    loadUrl('https://www.google.com');
  </script>
</body>
</html>
