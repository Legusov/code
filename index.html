<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🧑‍💻 Telegram Браузер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      height: 100vh; overflow: hidden; background: #f8f9fa;
      padding-top: 60px; /* ФИКС кнопок Telegram */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; padding: 12px 16px; 
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    
    .nav-btn {
      width: 40px; height: 40px; margin: 0 4px; 
      background: rgba(255,255,255,0.2); color: white; 
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 16px; transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.3); transform: scale(1.05); }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    #urlInput {
      flex: 1; margin: 0 8px; padding: 12px 16px; 
      border: none; border-radius: 20px; font-size: 14px;
      background: rgba(255,255,255,0.9); color: #333;
    }
    
    .content {
      height: calc(100vh - 64px); padding: 20px; overflow-y: auto;
      background: white; border-radius: 16px 16px 0 0; margin-top: 64px;
    }
    
    .site-card {
      background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 16px;
      cursor: pointer; transition: all 0.2s;
    }
    .site-card:hover { background: #e9ecef; transform: translateY(-2px); }
    
    .site-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .site-url { font-size: 12px; color: #666; }
    
    .status {
      position: fixed; bottom: 0; left: 0; right: 0; 
      padding: 8px; background: rgba(0,0,0,0.8); color: white; 
      font-size: 12px; text-align: center; z-index: 999;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="homeBtn" class="nav-btn" title="Яндекс">🏠</button>
    <button id="bookmarkBtn" class="nav-btn" title="YouTube">📺</button>
    <input type="text" id="urlInput" placeholder="ya.ru, google.com, youtube.com" />
    <button id="goBtn" class="nav-btn" title="Открыть">➤</button>
  </div>
  
  <div class="content">
    <div class="site-card" onclick="openUrl('https://ya.ru')">
      <div class="site-title">🏠 Яндекс</div>
      <div class="site-url">ya.ru</div>
    </div>
    <div class="site-card" onclick="openUrl('https://m.youtube.com')">
      <div class="site-title">📺 YouTube Mobile</div>
      <div class="site-url">m.youtube.com</div>
    </div>
    <div class="site-card" onclick="openUrl('https://www.google.com')">
      <div class="site-title">🔍 Google</div>
      <div class="site-url">google.com</div>
    </div>
    <div class="site-card" onclick="openUrl('https://vk.com')">
      <div class="site-title">💙 ВКонтакте</div>
      <div class="site-url">vk.com</div>
    </div>
  </div>
  
  <div class="status" id="status">Готов к работе!</div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.MainButton.setText('🚀 Открыть Яндекс').onClick(() => openUrl('https://ya.ru')).show();
    }
    
    const urlInput = document.getElementById('urlInput');
    const status = document.getElementById('status');
    
    function openUrl(url) {
      if (!url.match(/^https?:\/\//i)) url = 'https://' + url;
      
      status.textContent = `Открываем ${url.replace(/^https?:\/\//, '')}...`;
      
      if (tg) {
        tg.openLink(url, true); // true = в браузере Telegram
      } else {
        window.open(url, '_blank');
      }
    }
    
    // Кнопки
    document.getElementById('homeBtn').onclick = () => openUrl('https://ya.ru');
    document.getElementById('bookmarkBtn').onclick = () => openUrl('https://m.youtube.com');
    document.getElementById('goBtn').onclick = () => openUrl(urlInput.value);
    
    urlInput.onkeypress = (e) => { 
      if (e.key === 'Enter') openUrl(urlInput.value); 
    };
    
    // Подсказки популярных сайтов
    urlInput.onfocus = () => {
      if (!urlInput.value) {
        urlInput.placeholder = 'Например: ya.ru, google.com, vk.com';
      }
    };
  </script>
</body>
</html>
